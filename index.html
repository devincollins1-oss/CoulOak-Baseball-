                </div>

                <div id="videoLibrary">
                    <h3 style="margin-bottom: 15px;">Video Library <span id="videoLibraryCount" style="color: #7f8c8d; font-size: 14px;"></span></h3>
                    <div class="video-library" id="videoLibraryGrid"></div>
                </div>
            `;

            // Initialize video upload
            document.getElementById('videoUpload').addEventListener('change', handleVideoUpload);
            
            // Set default filter
            appState.videoFilter = 'all';
            updateVideoLibrary();
        }

        // Filter Videos
        window.filterVideos = function(type) {
            if (type === 'team') {
                appState.videoFilter = { type: 'team' };
                document.getElementById('filterPlayer').value = '';
                document.getElementById('filterTeam').style.background = '#27ae60';
                document.getElementById('currentFilter').textContent = 'Showing: Team Videos';
            } else if (type === 'player') {
                const playerNumber = parseInt(document.getElementById('filterPlayer').value);
                if (!playerNumber) {
                    appState.videoFilter = 'all';
                    document.getElementById('currentFilter').textContent = 'Showing: All Videos';
                    return;
                }
                const player = appState.players.find(p => p.number === playerNumber);
                appState.videoFilter = { type: 'player', playerNumber: playerNumber, playerName: `${player.first} ${player.last}` };
                document.getElementById('filterTeam').style.background = '#3498db';
                document.getElementById('currentFilter').textContent = `Showing: ${player.first} ${player.last} Videos`;
            } else {
                appState.videoFilter = 'all';
                document.getElementById('filterPlayer').value = '';
                document.getElementById('filterTeam').style.background = '#3498db';
                document.getElementById('currentFilter').textContent = 'Showing: All Videos';
            }
            
            updateVideoLibrary();
        }

        // Close Video Player
        window.closeVideoPlayer = function() {
            document.getElementById('videoPlayerSection').style.display = 'none';
            appState.currentVideo = null;
            appState.videoComments = [];
        }

        // Handle Video Upload
        function handleVideoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Prompt for video assignment
            document.getElementById('messageModalContent').innerHTML = `
                <h2 style="margin-bottom: 20px;">📹 Upload Video</h2>
                
                <div class="form-group">
                    <label>Video File</label>
                    <input type="text" value="${file.name}" readonly style="background: #f8f9fa;">
                </div>

                <div class="form-group">
                    <label>Video Title</label>
                    <input type="text" id="videoTitle" placeholder="e.g., Game vs Eagles - 3/15/24" value="${file.name.replace(/\.[^/.]+$/, '')}">
                </div>

                <div class="form-group">
                    <label>Assign To</label>
                    <select id="videoAssignment">
                        <option value="team">👥 Team Video (Everyone can see)</option>
                        <optgroup label="Assign to Player">
                            ${appState.players.map(p => 
                                `<option value="${p.number}">#${p.number} ${p.first} ${p.last}</option>`
                            ).join('')}
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="videoDescription" placeholder="Add notes about this video..."></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-success" onclick="confirmVideoUpload()">✓ Upload Video</button>
                    <button class="btn btn-secondary" onclick="closeModal('messageModal'); document.getElementById('videoUpload').value = '';">Cancel</button>
                </div>
            `;

            // Store file temporarily
            appState.tempVideoFile = file;
            document.getElementById('messageModal').classList.add('active');
        }

        // Confirm Video Upload
        window.confirmVideoUpload = function() {
            const file = appState.tempVideoFile;
            const title = document.getElementById('videoTitle').value.trim() || file.name;
            const assignment = document.getElementById('videoAssignment').value;
            const description = document.getElementById('videoDescription').value.trim();

            const videoURL = URL.createObjectURL(file);
            
            // Create video object
            const video = {
                id: Date.now(),
                name: title,
                fileName: file.name,
                url: videoURL,
                uploadDate: new Date(),
                uploadedBy: appState.currentUser,
                description: description,
                comments: [],
                assignedTo: assignment === 'team' ? 'team' : parseInt(assignment),
                playerName: assignment === 'team' ? null : appState.players.find(p => p.number === parseInt(assignment))
            };

            // Add to library
            appState.videos.push(video);

            // Close modal
            closeModal('messageModal');
            document.getElementById('videoUpload').value = '';
            delete appState.tempVideoFile;

            // Update library and load video
            updateVideoLibrary();
            loadVideo(video);
        }

        // Load Video
        function loadVideo(video) {
            appState.currentVideo = video;
            appState.videoComments = video.comments || [];
            
            const playerSection = document.getElementById('videoPlayerSection');
            const videoPlayer = document.getElementById('mainVideoPlayer');
            
            playerSection.style.display = 'block';
            videoPlayer.src = video.url;
            
            // Update video info
            document.getElementById('currentVideoTitle').textContent = video.name;
            let assignmentText = '';
            if (video.assignedTo === 'team') {
                assignmentText = '👥 Team Video';
            } else {
                const player = appState.players.find(p => p.number === video.assignedTo);
                if (player) {
                    assignmentText = `👤 ${player.first} ${player.last} #${player.number}`;
                }
            }
            document.getElementById('currentVideoPlayer').innerHTML = `
                ${assignmentText} • Uploaded by ${video.uploadedBy} • ${video.uploadDate.toLocaleDateString()}
                ${video.description ? `<br><em>${video.description}</em>` : ''}
            `;
            
            initializeVideoPlayer();
            updateCommentsList();
            
            // Scroll to player
            playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Initialize Video Player
        function initializeVideoPlayer() {
            const videoPlayer = document.getElementById('mainVideoPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const speedSlider = document.getElementById('speedSlider');
            const speedDisplay = document.getElementById('speedDisplay');
            const mainTimeline = document.getElementById('mainTimeline');
            const segmentTimeline = document.getElementById('segmentTimeline');
            const addCommentBtn = document.getElementById('addCommentBtn');
            const setLoopStartBtn = document.getElementById('setLoopStartBtn');
            const setLoopEndBtn = document.getElementById('setLoopEndBtn');
            const clearSegmentBtn = document.getElementById('clearSegmentBtn');

            // Video loaded
            videoPlayer.addEventListener('loadedmetadata', () => {
                appState.videoState.duration = videoPlayer.duration;
                appState.videoState.segmentEnd = videoPlayer.duration;
                document.getElementById('durationDisplay').textContent = formatTime(videoPlayer.duration);
                updateSegmentDisplay();
            });

            // Time update
            videoPlayer.addEventListener('timeupdate', () => {
                appState.videoState.currentTime = videoPlayer.currentTime;
                updateTimeDisplay();
                updatePlayhead();
                updateAnnotationDisplay();

                // Loop handling
                if (appState.videoState.isLooping && 
                    videoPlayer.currentTime >= appState.videoState.segmentEnd) {
                    videoPlayer.currentTime = appState.videoState.segmentStart;
                }
            });

            // Play/Pause
            playPauseBtn.addEventListener('click', () => {
                if (appState.videoState.isPlaying) {
                    videoPlayer.pause();
                } else {
                    videoPlayer.play();
                }
            });

            videoPlayer.addEventListener('play', () => {
                appState.videoState.isPlaying = true;
                playPauseBtn.textContent = '⏸ Pause';
            });

            videoPlayer.addEventListener('pause', () => {
                appState.videoState.isPlaying = false;
                playPauseBtn.textContent = '▶ Play';
            });

            // Speed control
            speedSlider.addEventListener('input', (e) => {
                const speed = parseFloat(e.target.value);
                videoPlayer.playbackRate = speed;
                speedDisplay.textContent = speed.toFixed(2) + 'x';
            });

            // Timeline click
            mainTimeline.addEventListener('click', (e) => {
                const rect = mainTimeline.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                videoPlayer.currentTime = percent * appState.videoState.duration;
            });

            // Segment controls
            initializeSegmentControls();

            // Mark loop buttons
            setLoopStartBtn.addEventListener('click', () => {
                appState.videoState.segmentStart = videoPlayer.currentTime;
                if (appState.videoState.segmentStart >= appState.videoState.segmentEnd) {
                    appState.videoState.segmentEnd = Math.min(appState.videoState.duration, appState.videoState.segmentStart + 5);
                }
                appState.videoState.isLooping = true;
                updateSegmentDisplay();
                
                setLoopStartBtn.style.background = '#27ae60';
                setLoopStartBtn.textContent = '✓ Start Marked';
                setTimeout(() => {
                    setLoopStartBtn.style.background = '#3498db';
                    setLoopStartBtn.textContent = '⏮ Mark Start';
                }, 1000);
            });

            setLoopEndBtn.addEventListener('click', () => {
                appState.videoState.segmentEnd = videoPlayer.currentTime;
                if (appState.videoState.segmentEnd <= appState.videoState.segmentStart) {
                    appState.videoState.segmentStart = Math.max(0, appState.videoState.segmentEnd - 5);
                }
                appState.videoState.isLooping = true;
                updateSegmentDisplay();
                videoPlayer.currentTime = appState.videoState.segmentStart;
                
                setLoopEndBtn.style.background = '#27ae60';
                setLoopEndBtn.textContent = '✓ End Marked';
                setTimeout(() => {
                    setLoopEndBtn.style.background = '#3498db';
                    setLoopEndBtn.textContent = '⏭ Mark End';
                }, 1000);
            });

            clearSegmentBtn.addEventListener('click', () => {
                appState.videoState.segmentStart = 0;
                appState.videoState.segmentEnd = appState.videoState.duration;
                appState.videoState.isLooping = false;
                updateSegmentDisplay();
            });

            // Add comment
            addCommentBtn.addEventListener('click', () => {
                openCommentModal();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                const key = e.key.toLowerCase();
                switch(key) {
                    case 'i':
                        setLoopStartBtn.click();
                        break;
                    case 'o':
                        setLoopEndBtn.click();
                        break;
                    case ' ':
                        e.preventDefault();
                        playPauseBtn.click();
                        break;
                    case 'r':
                        clearSegmentBtn.click();
                        break;
                    case 'arrowleft':
                        e.preventDefault();
                        videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 5);
                        break;
                    case 'arrowright':
                        e.preventDefault();
                        videoPlayer.currentTime = Math.min(appState.videoState.duration, videoPlayer.currentTime + 5);
                        break;
                }
            });
        }

        // Initialize Segment Controls
        function initializeSegmentControls() {
            const segmentTimeline = document.getElementById('segmentTimeline');
            const segmentStart = document.getElementById('segmentStart');
            const segmentEnd = document.getElementById('segmentEnd');
            let draggingHandle = null;
            let isSelectingSegment = false;
            let selectionStartTime = 0;

            // Click and drag to select
            segmentTimeline.addEventListener('mousedown', (e) => {
                if (e.target === segmentStart || e.target === segmentEnd) return;
                
                const rect = segmentTimeline.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                selectionStartTime = percent * appState.videoState.duration;
                isSelectingSegment = true;
                
                appState.videoState.segmentStart = selectionStartTime;
                appState.videoState.segmentEnd = selectionStartTime;
                updateSegmentDisplay();
            });

            segmentTimeline.addEventListener('mousemove', (e) => {
                if (isSelectingSegment) {
                    const rect = segmentTimeline.getBoundingClientRect();
                    const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    const currentTime = percent * appState.videoState.duration;
                    
                    if (currentTime >= selectionStartTime) {
                        appState.videoState.segmentStart = selectionStartTime;
                        appState.videoState.segmentEnd = currentTime;
                    } else {
                        appState.videoState.segmentStart = currentTime;
                        appState.videoState.segmentEnd = selectionStartTime;
                    }
                    
                    updateSegmentDisplay();
                }
            });

            document.addEventListener('mouseup', () => {
                if (isSelectingSegment) {
                    isSelectingSegment = false;
                    if (appState.videoState.segmentEnd - appState.videoState.segmentStart >= 0.5) {
                        appState.videoState.isLooping = true;
                        document.getElementById('mainVideoPlayer').currentTime = appState.videoState.segmentStart;
                    } else {
                        appState.videoState.segmentStart = 0;
                        appState.videoState.segmentEnd = appState.videoState.duration;
                        appState.videoState.isLooping = false;
                    }
                    updateSegmentDisplay();
                }
            });

            // Handle dragging
            segmentStart.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                draggingHandle = 'start';
            });

            segmentEnd.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                draggingHandle = 'end';
            });

            document.addEventListener('mousemove', (e) => {
                if (draggingHandle && !isSelectingSegment) {
                    const rect = segmentTimeline.getBoundingClientRect();
                    const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    const time = percent * appState.videoState.duration;

                    if (draggingHandle === 'start') {
                        const maxStart = appState.videoState.segmentEnd - 0.5;
                        appState.videoState.segmentStart = Math.min(time, maxStart);
                        appState.videoState.isLooping = true;
                    } else if (draggingHandle === 'end') {
                        const minEnd = appState.videoState.segmentStart + 0.5;
                        appState.videoState.segmentEnd = Math.max(time, minEnd);
                        appState.videoState.isLooping = true;
                    }

                    updateSegmentDisplay();
                }
            });

            document.addEventListener('mouseup', () => {
                if (draggingHandle) {
                    draggingHandle = null;
                    if (appState.videoState.isLooping) {
                        document.getElementById('mainVideoPlayer').currentTime = appState.videoState.segmentStart;
                    }
                }
            });
        }

        // Helper Functions
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            document.getElementById('currentTimeDisplay').textContent = formatTime(appState.videoState.currentTime);
        }

        function updatePlayhead() {
            const percent = (appState.videoState.currentTime / appState.videoState.duration) * 100;
            document.getElementById('timelineProgress').style.width = percent + '%';
            document.getElementById('playhead').style.left = percent + '%';
        }

        function updateSegmentDisplay() {
            const startPercent = (appState.videoState.segmentStart / appState.videoState.duration) * 100;
            const endPercent = (appState.videoState.segmentEnd / appState.videoState.duration) * 100;
            
            const highlight = document.getElementById('segmentHighlight');
            const startHandle = document.getElementById('segmentStart');
            const endHandle = document.getElementById('segmentEnd');
            
            highlight.style.left = startPercent + '%';
            highlight.style.width = (endPercent - startPercent) + '%';
            
            startHandle.style.left = startPercent + '%';
            endHandle.style.left = endPercent + '%';
            
            document.getElementById('segmentStartLabel').textContent = formatTime(appState.videoState.segmentStart);
            document.getElementById('segmentEndLabel').textContent = formatTime(appState.videoState.segmentEnd);
            
            const duration = appState.videoState.segmentEnd - appState.videoState.segmentStart;
            document.getElementById('segmentDuration').textContent = `Loop: ${formatTime(duration)}`;
            
            const isFullVideo = appState.videoState.segmentStart === 0 && 
                               appState.videoState.segmentEnd === appState.videoState.duration;
            const loopIndicator = document.getElementById('loopIndicator');
            if (isFullVideo) {
                loopIndicator.style.display = 'none';
                appState.videoState.isLooping = false;
            } else {
                loopIndicator.style.display = 'block';
                document.getElementById('loopStartTime').textContent = formatTime(appState.videoState.segmentStart);
                document.getElementById('loopEndTime').textContent = formatTime(appState.videoState.segmentEnd);
            }
        }

        function updateAnnotationDisplay() {
            const annotationLayer = document.getElementById('annotationLayer');
            if (!annotationLayer) return;
            
            annotationLayer.innerHTML = '';

            const activeComments = appState.videoComments.filter(comment => {
                if (comment.type === 'segment') {
                    return appState.videoState.currentTime >= comment.startTime && 
                           appState.videoState.currentTime <= comment.endTime;
                } else {
                    return Math.abs(appState.videoState.currentTime - comment.time) <= 1.5;
                }
            });

            activeComments.forEach((comment, index) => {
                if (comment.text) {
                    const textDiv = document.createElement('div');
                    textDiv.className = 'text-annotation';
                    textDiv.style.borderColor = comment.color;
                    textDiv.style.top = (10 + index * 70) + 'px';
                    textDiv.style.left = '10px';
                    textDiv.style.maxWidth = '300px';
                    textDiv.style.zIndex = '10';
                    
                    const roleIcon = comment.role === 'coach' ? '👨‍🏫' : 
                                    comment.role === 'parent' ? '👪' : '🏃';
                    
                    textDiv.innerHTML = `<strong>${roleIcon} ${comment.user}:</strong> ${comment.text}`;
                    annotationLayer.appendChild(textDiv);
                }

                if (comment.drawing) {
                    const img = document.createElement('img');
                    img.src = comment.drawing;
                    img.className = 'drawing-annotation';
                    annotationLayer.appendChild(img);
                }
            });
        }

        function updateCommentsList() {
            const commentsList = document.getElementById('commentsList');
            const commentCount = document.getElementById('commentCount');
            
            if (!commentsList) return;
            
            commentsList.innerHTML = '';
            commentCount.textContent = appState.videoComments.length;

            const sortedComments = [...appState.videoComments].sort((a, b) => a.time - b.time);

            sortedComments.forEach(comment => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.style.borderLeftColor = comment.color;
                
                const roleIcon = comment.role === 'coach' ? '👨‍🏫' : 
                                comment.role === 'parent' ? '👪' : '🏃';
                
                div.innerHTML = `
                    <div class="comment-header">
                        <span class="comment-user">${roleIcon} ${comment.user}</span>
                        <span class="comment-time">${formatTime(comment.time)}</span>
                    </div>
                    <div class="comment-text">${comment.text}</div>
                    ${comment.type === 'segment' ? `<div style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">📍 ${formatTime(comment.startTime)} - ${formatTime(comment.endTime)}</div>` : ''}
                `;

                div.addEventListener('click', () => {
                    const videoPlayer = document.getElementById('mainVideoPlayer');
                    videoPlayer.pause();
                    
                    if (comment.type === 'segment') {
                        appState.videoState.segmentStart = comment.startTime;
                        appState.videoState.segmentEnd = comment.endTime;
                        appState.videoState.isLooping = true;
                        updateSegmentDisplay();
                        videoPlayer.currentTime = comment.startTime;
                    } else {
                        videoPlayer.currentTime = Math.max(0, comment.time - 2);
                    }
                });

                commentsList.appendChild(div);
            });

            updateUserColors();
            updateCommentMarkers();
        }

        function updateUserColors() {
            const userColors = document.getElementById('userColors');
            if (!userColors) return;
            
            userColors.innerHTML = '';

            const userColorMap = new Map();
            appState.videoComments.forEach(comment => {
                if (!userColorMap.has(comment.user)) {
                    userColorMap.set(comment.user, {
                        color: comment.color,
                        role: comment.role
                    });
                }
            });

            userColorMap.forEach((data, user) => {
                const badge = document.createElement('div');
                badge.className = 'user-badge';
                
                const roleIcon = data.role === 'coach' ? '👨‍🏫' : 
                                data.role === 'parent' ? '👪' : '🏃';
                
                badge.innerHTML = `
                    <div class="user-color-indicator" style="background: ${data.color}"></div>
                    <span>${roleIcon} ${user}</span>
                `;
                userColors.appendChild(badge);
            });
        }

        function updateCommentMarkers() {
            const commentMarkers = document.getElementById('commentMarkers');
            if (!commentMarkers) return;
            
            commentMarkers.innerHTML = '';

            appState.videoComments.forEach(comment => {
                const marker = document.createElement('div');
                marker.className = 'comment-marker';
                marker.style.backgroundColor = comment.color;
                
                const percent = (comment.time / appState.videoState.duration) * 100;
                marker.style.left = percent + '%';
                
                marker.title = `${comment.user}: ${comment.text.substring(0, 50)}...`;
                
                marker.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const videoPlayer = document.getElementById('mainVideoPlayer');
                    videoPlayer.currentTime = comment.time;
                });

                commentMarkers.appendChild(marker);
            });
        }

        function updateVideoLibrary() {
            const grid = document.getElementById('videoLibraryGrid');
            const countDisplay = document.getElementById('videoLibraryCount');
            if (!grid) return;
            
            grid.innerHTML = '';

            // Filter videos based on current filter
            let filteredVideos = appState.videos;
            if (appState.videoFilter && appState.videoFilter.type === 'team') {
                filteredVideos = appState.videos.filter(v => v.assignedTo === 'team');
            } else if (appState.videoFilter && appState.videoFilter.type === 'player') {
                filteredVideos = appState.videos.filter(v => v.assignedTo === appState.videoFilter.playerNumber);
            }

            // Update count
            if (countDisplay) {
                countDisplay.textContent = `(${filteredVideos.length} video${filteredVideos.length !== 1 ? 's' : ''})`;
            }

            if (filteredVideos.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #7f8c8d;">
                        <div style="font-size: 48px; margin-bottom: 15px;">📹</div>
                        <p>No videos found for this filter</p>
                    </div>
                `;
                return;
            }

            filteredVideos.forEach(video => {
                let assignmentBadge = '';
                if (video.assignedTo === 'team') {
                    assignmentBadge = '<span style="background: #3498db; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">👥 TEAM</span>';
                } else {
                    const player = appState.players.find(p => p.number === video.assignedTo);
                    if (player) {
                        assignmentBadge = `<span style="background: #27ae60; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">👤 #${player.number} ${player.first}</span>`;
                    }
                }

                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-thumbnail">
                        <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: white; font-size: 48px;">
                            🎥
                        </div>
                    </div>
                    <div class="video-info">
                        <div style="margin-bottom: 8px;">
                            ${assignmentBadge}
                        </div>
                        <div class="video-title">${video.name}</div>
                        <div class="video-meta">
                            ${video.comments.length} comment${video.comments.length !== 1 ? 's' : ''} • ${video.uploadDate.toLocaleDateString()}
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => loadVideo(video));
                grid.appendChild(card);
            });
        }

        function openCommentModal() {
            const videoPlayer = document.getElementById('mainVideoPlayer');
            videoPlayer.pause();
            
            document.getElementById('messageModalContent').innerHTML = `
                <h2 style="margin-bottom: 20px;">💬 Add Video Comment</h2>
                
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="commentUserName" value="${appState.currentUser}" readonly style="background: #f8f9fa;">
                </div>

                <div class="form-group">
                    <label>Comment Type</label>
                    <select id="videoCommentType">
                        <option value="point">Point Comment (this moment: ${formatTime(appState.videoState.currentTime)})</option>
                        <option value="segment">Segment Comment (current loop: ${formatTime(appState.videoState.segmentStart)} - ${formatTime(appState.videoState.segmentEnd)})</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Comment</label>
                    <textarea id="videoCommentText" placeholder="Example: Great positioning on defense here. Notice how #7 keeps spacing..." style="min-height: 100px;"></textarea>
                </div>

                <div class="form-group">
                    <label>Color Tag</label>
                    <div class="color-picker" id="videoColorPicker">
                        <div class="color-option selected" style="background: #e74c3c" data-color="#e74c3c"></div>
                        <div class="color-option" style="background: #3498db" data-color="#3498db"></div>
                        <div class="color-option" style="background: #2ecc71" data-color="#2ecc71"></div>
                        <div class="color-option" style="background: #f39c12" data-color="#f39c12"></div>
                        <div class="color-option" style="background: #9b59b6" data-color="#9b59b6"></div>
                        <div class="color-option" style="background: #1abc9c" data-color="#1abc9c"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Draw on Video (optional)</label>
                    <canvas id="videoDrawingCanvas" class="drawing-canvas" width="640" height="360"></canvas>
                    <button type="button" class="btn btn-secondary" style="margin-top: 10px;" onclick="window.clearVideoDrawing()">Clear Drawing</button>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-success" onclick="window.saveVideoComment()">💾 Save Comment</button>
                    <button class="btn btn-secondary" onclick="closeModal('messageModal')">Cancel</button>
                </div>
            `;

            // Initialize color picker
            document.querySelectorAll('#videoColorPicker .color-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('#videoColorPicker .color-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    appState.videoState.userColor = opt.dataset.color;
                });
            });

            // Initialize drawing canvas
            const canvas = document.getElementById('videoDrawingCanvas');
            const ctx = canvas.getContext('2d');
            
            // Draw current frame
            ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
            
            // Enable drawing
            let isDrawing = false;
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                ctx.strokeStyle = appState.videoState.userColor;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (isDrawing) {
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                    ctx.stroke();
                }
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
            });

            document.getElementById('messageModal').classList.add('active');
        }

        // Global functions for video comment modal
        window.clearVideoDrawing = function() {
            const canvas = document.getElementById('videoDrawingCanvas');
            const ctx = canvas.getContext('2d');
            const videoPlayer = document.getElementById('mainVideoPlayer');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
        }

        window.saveVideoComment = function() {
            const userName = document.getElementById('commentUserName').value;
            const type = document.getElementById('videoCommentType').value;
            const text = document.getElementById('videoCommentText').value.trim();
            const canvas = document.getElementById('videoDrawingCanvas');
            
            if (!text) {
                alert('Please enter a comment');
                return;
            }

            // Check if canvas has drawing
            const blank = document.createElement('canvas');
            blank.width = canvas.width;
            blank.height = canvas.height;
            const blankCtx = blank.getContext('2d');
            const videoPlayer = document.getElementById('mainVideoPlayer');
            blankCtx.drawImage(videoPlayer, 0, 0, blank.width, blank.height);
            const hasDrawing = canvas.toDataURL() !== blank.toDataURL();

            const comment = {
                id: Date.now(),
                user: userName,
                role: appState.currentRole,
                color: appState.videoState.userColor,
                type: type,
                text: text,
                time: type === 'point' ? appState.videoState.currentTime : appState.videoState.segmentStart,
                startTime: type === 'segment' ? appState.videoState.segmentStart : null,
                endTime: type === 'segment' ? appState.videoState.segmentEnd : null,
                drawing: hasDrawing ? canvas.toDataURL() : null,
                timestamp: new Date().toISOString()
            };

            appState.videoComments.push(comment);
            appState.currentVideo.comments = appState.videoComments;
            
            updateCommentsList();
            updateCommentMarkers();
            updateVideoLibrary();
            
            closeModal('messageModal');
            videoPlayer.currentTime = comment.time;
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function updateAdherence() {
            // Simple adherence tracker
            const checkboxes = document.querySelectorAll('.drill-checklist input[type="checkbox"]');
            const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
            const total = checkboxes.length;
            const pct = (checked / total * 100);
            
            document.getElementById('adherenceBar').style.width = pct + '%';
            document.getElementById('adherenceText').textContent = `${checked} of 7 days completed`;
        }

        // Tab Navigation
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('nav-tab')) {
                const tabName = e.target.dataset.tab;
                
                // Update active tab
                e.target.parentElement.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                
                // Update active content
                const container = e.target.closest('#coachView, #parentView');
                container.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                container.querySelector(`#${tabName}`).classList.add('active');
            }
        });

        // File Upload
        const uploadArea = document.getElementById('uploadArea');
        const csvFileInput = document.getElementById('csvFileInput');

        if (uploadArea) {
            uploadArea.addEventListener('click', () => {
                csvFileInput.click();
            });

            csvFileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileUpload(e.target.files[0]);
                }
            });
        }

        function handleFileUpload(file) {
            document.getElementById('uploadStatus').innerHTML = `
                <div class="player-card">
                    <h3 style="color: #27ae60;">✓ CSV File Uploaded Successfully</h3>
                    <p style="margin-top: 10px;">File: ${file.name}</p>
                    <p style="color: #7f8c8d; margin-top: 5px;">Stats have been processed and focus signals generated.</p>
                    <button class="btn btn-primary" style="margin-top: 15px;" onclick="document.querySelector('[data-tab=\\"focus-queue\\"]').click()">
                        View Focus Queue →
                    </button>
                </div>
            `;
        }

        // ============================================
        // DATA BACKUP & RESTORE FUNCTIONS
        // ============================================

        function exportAllData() {
            try {
                // Collect all data from localStorage
                const backupData = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    appName: 'Couloak Diesel Development OS',
                    data: {
                        players: localStorage.getItem('players'),
                        seasons: localStorage.getItem('seasons'),
                        currentSeason: localStorage.getItem('currentSeason'),
                        parentAccess: localStorage.getItem('parentAccess'),
                        focusSignals: localStorage.getItem('focusSignals'),
                        developmentPlans: localStorage.getItem('developmentPlans')
                    }
                };
                
                // Convert to JSON
                const dataStr = JSON.stringify(backupData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // Create download link
                const a = document.createElement('a');
                a.href = url;
                
                // Generate filename with date
                const date = new Date().toISOString().split('T')[0];
                a.download = `couloak-diesel-backup-${date}.json`;
                
                // Trigger download
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                // Update last backup date
                localStorage.setItem('lastBackupDate', new Date().toISOString().split('T')[0]);
                
                // Show success message
                alert('✅ Backup exported successfully!\n\nFile saved: ' + a.download + '\n\nStore this file safely in Google Drive, Dropbox, or email it to yourself.');
                
            } catch (error) {
                console.error('Export error:', error);
                alert('❌ Error exporting backup: ' + error.message);
            }
        }

        function importData(file) {
            if (!file) {
                alert('❌ No file selected');
                return;
            }
            
            // Confirm before importing (will overwrite current data)
            const confirmed = confirm(
                '⚠️ WARNING: Importing will REPLACE all current data.\n\n' +
                'Make sure you have exported a backup of your current data first!\n\n' +
                'Continue with import?'
            );
            
            if (!confirmed) {
                // Reset file input
                document.getElementById('importFile').value = '';
                return;
            }
            
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    // Parse JSON
                    const backupData = JSON.parse(e.target.result);
                    
                    // Validate backup file
                    if (!backupData.version || !backupData.data) {
                        throw new Error('Invalid backup file format');
                    }
                    
                    // Restore all data
                    Object.keys(backupData.data).forEach(key => {
                        if (backupData.data[key] !== null) {
                            localStorage.setItem(key, backupData.data[key]);
                        }
                    });
                    
                    // Show success and reload
                    alert(
                        '✅ Backup restored successfully!\n\n' +
                        'Backup date: ' + new Date(backupData.exportDate).toLocaleString() + '\n\n' +
                        'Page will reload to show restored data.'
                    );
                    
                    location.reload();
                    
                } catch (error) {
                    console.error('Import error:', error);
                    alert('❌ Error importing backup: ' + error.message + '\n\nPlease check that you selected a valid backup file.');
                }
            };
            
            reader.onerror = function() {
                alert('❌ Error reading file');
            };
            
            reader.readAsText(file);
        }

        function downloadBackupGuide() {
            const guide = `COULOAK DIESEL BACKUP GUIDE
============================

WHY BACKUP?

Your team data is stored in your browser. If you clear your browser cache or use a 
different device, the data will be lost. Regular backups protect against data loss.

TIPS:

            const blob = new Blob([guide], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'couloak-diesel-backup-guide.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('📄 Backup guide downloaded!\n\nCheck your downloads folder for instructions.');
        }

        // Add automatic backup reminder
        function checkBackupReminder() {
            const lastBackup = localStorage.getItem('lastBackupDate');
            const today = new Date().toISOString().split('T')[0];
            
            if (!lastBackup) {
                // First time - set reminder for next week
                localStorage.setItem('lastBackupDate', today);
                return;
            }
            
            // Check if more than 7 days since last backup
            const daysSinceBackup = Math.floor(
                (new Date(today) - new Date(lastBackup)) / (1000 * 60 * 60 * 24)
            );
            
            if (daysSinceBackup >= 7) {
                setTimeout(() => {
                    const shouldBackup = confirm(
                        '💾 Backup Reminder\n\n' +
                        'It\'s been ' + daysSinceBackup + ' days since your last backup.\n\n' +
                        'Would you like to create a backup now?'
                    );
                    
                    if (shouldBackup) {
                        exportAllData();
                    }
                }, 2000); // Wait 2 seconds after page load
            }
        }

        // Run backup reminder check when page loads (only for coach view)
        if (document.querySelector('#coachView')) {
            checkBackupReminder();
        }
    </script>
